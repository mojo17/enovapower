name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  publish:
    # Publish only from GitHub Actions: PyPI Trusted Publishing (OIDC) isn't
    # available on Gitea Actions, which also lacks the v4 artifact backend.
    # On Gitea this condition is false, so the job is skipped (not failed).
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing (OIDC); no token stored
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: pipx run build

      - name: Check metadata
        run: pipx run twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
