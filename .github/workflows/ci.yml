name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Every job installs into a per-job virtualenv (.venv) rather than the
# interpreter set up by actions/setup-python. On a shared self-hosted runner
# (e.g. Gitea Actions) that interpreter lives in a cached, reused tool-cache
# volume, so installing into it leaks packages between jobs and repos. A fresh
# venv in the ephemeral workspace keeps each job a clean room.

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create venv and install
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e ".[dev]"

      - name: Lint
        run: .venv/bin/ruff check enovapower/ tests/

      - name: Type check
        run: .venv/bin/mypy

      - name: Test
        run: .venv/bin/pytest tests/ -v

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Create venv and install
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip setuptools wheel
          .venv/bin/python -m pip install -e . pip-audit

      - name: Audit dependencies for known vulnerabilities
        run: .venv/bin/pip-audit --skip-editable
