name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check enovapower/ tests/

      - name: Type check
        run: mypy

      - name: Test
        run: pytest tests/ -v

  audit:
    runs-on: ubuntu-latest
    # GitHub-hosted runners only. pip-audit inspects the whole Python
    # environment; a shared self-hosted runner (e.g. Gitea Actions) may have
    # unrelated projects installed and pollute the scan. GitHub-hosted runners
    # are clean per job. On Gitea this condition is false, so the job is skipped.
    if: ${{ github.server_url == 'https://github.com' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install -e . pip-audit

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit --skip-editable
